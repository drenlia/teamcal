services:
  teamcal:
    build: .
    ports:
      - "${PORT:-3004}:${PORT:-3004}"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3004}
      DATABASE_PATH: /data/schedule.db
      DEMO_MODE: ${DEMO_MODE:-false}
    volumes:
      - teamcal-data:/data
    restart: unless-stopped

volumes:
  teamcal-data:
